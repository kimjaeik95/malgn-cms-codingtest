spring:
  profiles:
    active:

  datasource:
    url: jdbc:h2:mem:MalgnCMS;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: root
    password: 1234
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true


  flyway:
    enabled: true
    mixed: true
    baseline-on-migrate: false
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: DEBUG